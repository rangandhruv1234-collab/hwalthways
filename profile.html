<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — HEALTHWAYS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{font-family:'Inter',sans-serif;overflow-x:hidden;background:#080808;color:#fff;display:flex;flex-direction:column;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,146,42,0.06) 0%,transparent 60%);}

/* Header */
.page-header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:22px 40px;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo-link{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-img{height:36px;width:36px;object-fit:contain;mix-blend-mode:lighten;}
.logo-text{font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;letter-spacing:4px;text-transform:uppercase;color:#fff;}
.logo-text em{font-style:normal;background:linear-gradient(135deg,#C9922A,#E8B84B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-link{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s;}
.back-link:hover{color:rgba(255,255,255,0.75);}

/* Main */
.page-main{flex:1;display:flex;justify-content:center;padding:52px 24px 80px;position:relative;z-index:1;}
.profile-wrap{width:100%;max-width:600px;}

/* ── NOT LOGGED IN ── */
.login-prompt{text-align:center;padding:20px 0;}
.lp-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:28px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:10px;}
.lp-sub{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,0.4);line-height:1.8;margin-bottom:32px;}
.lp-btn{display:inline-block;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#C9922A,#E8B84B);padding:15px 40px;text-decoration:none;transition:opacity 0.2s;}
.lp-btn:hover{opacity:0.88;}

/* ── PROFILE HEADER ── */
.profile-eyebrow{font-family:'Inter',sans-serif;font-size:9px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px;}
.profile-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:36px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:32px;line-height:1;}
.profile-title em{font-style:normal;background:linear-gradient(135deg,#C9922A,#E8B84B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* User card */
.user-card{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.025);padding:24px 28px;display:flex;align-items:center;gap:20px;margin-bottom:36px;}
.user-avatar{width:52px;height:52px;background:linear-gradient(135deg,#C9922A,#E8B84B);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-avatar-letter{font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;color:#fff;text-transform:uppercase;}
.user-info{flex:1;min-width:0;}
.user-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;letter-spacing:1px;text-transform:uppercase;color:#fff;margin-bottom:4px;}
.user-mobile{font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;}
.logout-btn{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);background:none;border:1px solid rgba(255,255,255,0.1);padding:9px 16px;cursor:pointer;transition:color 0.2s,border-color 0.2s;flex-shrink:0;}
.logout-btn:hover{color:#fff;border-color:rgba(255,255,255,0.4);}

/* Section label */
.section-label{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}

/* Booking card */
.booking-card{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);margin-bottom:12px;overflow:hidden;}
.booking-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.06);}
.booking-facility{display:flex;align-items:center;gap:10px;}
.facility-dot{width:8px;height:8px;border-radius:50%;}
.facility-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#fff;}
.booking-status{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border:1px solid;}
.status-upcoming{color:#4ade80;border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}
.status-past{color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.1);}
.booking-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.booking-field{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05);}
.booking-field:nth-child(2n){border-right:none;}
.booking-field:nth-last-child(-n+2){border-bottom:none;}
.bf-key{font-family:'Inter',sans-serif;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:5px;}
.bf-val{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:#fff;line-height:1.4;}

/* No bookings state */
.no-bookings{border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.015);padding:36px 28px;text-align:center;margin-bottom:28px;}
.no-bookings p{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:20px;line-height:1.7;}

/* Book trial buttons */
.book-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px;}
.book-strip-btn{flex:1;min-width:200px;display:block;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#fff;padding:13px 20px;text-align:center;text-decoration:none;transition:opacity 0.2s;border:none;cursor:pointer;}
.book-strip-btn:hover{opacity:0.86;}
.btn-gym{background:linear-gradient(135deg,#C9922A,#E8B84B);}
.btn-swim{background:linear-gradient(135deg,#0EA5E9,#38BDF8);}

/* Responsive */
@media(max-width:560px){
  .page-header{padding:18px 20px;}
  .page-main{padding:36px 20px 60px;}
  .profile-title{font-size:28px;}
  .user-card{flex-wrap:wrap;}
  .logout-btn{width:100%;}
  .booking-body{grid-template-columns:1fr;}
  .booking-field{border-right:none;}
  .booking-field:nth-last-child(-n+2){border-bottom:1px solid rgba(255,255,255,0.05);}
  .booking-field:last-child{border-bottom:none;}
  .book-strip{flex-direction:column;}
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<header class="page-header">
  <a href="index.html" class="logo-link">
    <img class="logo-img" src="images/logo.jpg" alt="HEALTHWAYS"/>
    <span class="logo-text">HEALTH<em>WAYS</em></span>
  </a>
  <a href="index.html" class="back-link">← Home</a>
</header>

<main class="page-main">
  <div class="profile-wrap" id="profileWrap">
    <!-- Rendered by JS -->
  </div>
</main>

<script>
// ── Read session ──
var session = null;
try { session = JSON.parse(localStorage.getItem('hw_session')); } catch {}

var wrap = document.getElementById('profileWrap');

if (!session) {
  // ── NOT LOGGED IN ──
  wrap.innerHTML =
    '<div class="login-prompt">' +
      '<h2 class="lp-title">Not Logged In</h2>' +
      '<p class="lp-sub">Please log in or register to view your profile<br>and manage your free trial bookings.</p>' +
      '<a href="login.html?redirect=profile" class="lp-btn">Login / Register &nbsp;→</a>' +
    '</div>';
} else {
  // ── LOGGED IN — render profile ──
  var name       = session.name || 'Member';
  var mobile     = session.identifier || '';
  var maskedMob  = mobile.length >= 4 ? mobile.slice(0,2) + '●●●●●●' + mobile.slice(-2) : mobile;
  var initial    = name.charAt(0).toUpperCase();

  // Load all bookings for this user
  var allBookings = [];
  try { allBookings = JSON.parse(localStorage.getItem('hw_bookings') || '[]'); } catch {}
  var userBookings = allBookings.filter(function(b){ return b.identifier === mobile; });

  // Sort by date desc
  userBookings.sort(function(a,b){ return b.date > a.date ? 1 : -1; });

  var today = new Date(); today.setHours(0,0,0,0);

  function isUpcoming(dateStr) {
    try {
      var d = new Date(dateStr + 'T00:00:00');
      return d >= today;
    } catch { return false; }
  }

  function fmtDate(dateStr) {
    try {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    } catch { return dateStr; }
  }

  // ── User card ──
  var userCardHtml =
    '<div class="user-card">' +
      '<div class="user-avatar"><span class="user-avatar-letter">' + initial + '</span></div>' +
      '<div class="user-info">' +
        '<div class="user-name">' + name + '</div>' +
        '<div class="user-mobile">' + (maskedMob ? maskedMob : 'No mobile on file') + '</div>' +
      '</div>' +
      '<button class="logout-btn" onclick="doLogout()">Log Out</button>' +
    '</div>';

  // ── Booking cards ──
  var gymBookings  = userBookings.filter(function(b){ return b.source === 'gym'; });
  var swimBookings = userBookings.filter(function(b){ return b.source === 'swimming'; });

  function renderBookings(list) {
    if (!list.length) return '';
    return list.map(function(b) {
      var upcoming = isUpcoming(b.date);
      var isGym    = b.source === 'gym';
      var dotColor = isGym ? '#C9922A' : '#0EA5E9';
      var facility = isGym ? 'Gym' : 'Swimming Pool';
      return (
        '<div class="booking-card">' +
          '<div class="booking-header">' +
            '<div class="booking-facility">' +
              '<div class="facility-dot" style="background:' + dotColor + '"></div>' +
              '<span class="facility-name">' + facility + '</span>' +
            '</div>' +
            '<span class="booking-status ' + (upcoming ? 'status-upcoming' : 'status-past') + '">' +
              (upcoming ? 'Upcoming' : 'Past') +
            '</span>' +
          '</div>' +
          '<div class="booking-body">' +
            '<div class="booking-field"><p class="bf-key">Goal</p><p class="bf-val">' + (b.goal || '—') + '</p></div>' +
            '<div class="booking-field"><p class="bf-key">Date</p><p class="bf-val">' + fmtDate(b.date) + '</p></div>' +
            '<div class="booking-field"><p class="bf-key">Time</p><p class="bf-val">' + (b.time || '—') + '</p></div>' +
            '<div class="booking-field"><p class="bf-key">Booked On</p><p class="bf-val">' + fmtDate((b.bookedAt || '').split('T')[0]) + '</p></div>' +
          '</div>' +
        '</div>'
      );
    }).join('');
  }

  var hasGymBooking  = gymBookings.length > 0;
  var hasSwimBooking = swimBookings.length > 0;

  // Build "book a trial" strip for unbooked facilities
  var bookStripHtml = '';
  var bookBtns = [];
  if (!hasGymBooking)  bookBtns.push('<a href="book-trial.html?source=gym&name=' + encodeURIComponent(name) + '" class="book-strip-btn btn-gym">Book Gym Trial &nbsp;→</a>');
  if (!hasSwimBooking) bookBtns.push('<a href="book-trial.html?source=swimming&name=' + encodeURIComponent(name) + '" class="book-strip-btn btn-swim">Book Swimming Trial &nbsp;→</a>');
  if (bookBtns.length) bookStripHtml = '<div class="book-strip">' + bookBtns.join('') + '</div>';

  // Bookings section
  var bookingsSectionHtml = '';
  if (!userBookings.length) {
    bookingsSectionHtml =
      '<div class="no-bookings">' +
        '<p>You haven\'t booked a free trial yet.<br>Choose a facility below to get started.</p>' +
      '</div>';
  } else {
    if (gymBookings.length) {
      bookingsSectionHtml +=
        '<p class="section-label" style="margin-top:8px;">Gym Bookings</p>' +
        renderBookings(gymBookings);
    }
    if (swimBookings.length) {
      bookingsSectionHtml +=
        '<p class="section-label" style="margin-top:24px;">Swimming Pool Bookings</p>' +
        renderBookings(swimBookings);
    }
  }

  wrap.innerHTML =
    '<p class="profile-eyebrow">Healthways · Keshav Puram, Delhi</p>' +
    '<h1 class="profile-title">MY <em>PROFILE</em></h1>' +
    userCardHtml +
    '<p class="section-label">My Bookings</p>' +
    bookingsSectionHtml +
    bookStripHtml;
}

function doLogout() {
  if (!confirm('Log out of your account?')) return;
  localStorage.removeItem('hw_session');
  location.href = 'index.html';
}
</script>

</body>
